# Qlty config for logos (Go library)
# Replaces lefthook.yml

config_version = "0"

exclude_patterns = [
  "**/testdata/**",
]

test_patterns = [
  "**/*_test.go",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true

# Go formatting
[[plugin]]
name = "gofmt"

# Go linting — fmt check, vet, lint via golangci-lint
# Pinned to 2.10.1 (built with Go 1.26.0) — qlty's default version was built
# with Go 1.23 which is too old for this project's go 1.26.1 requirement.
[[plugin]]
name = "golangci-lint"
version = "2.10.1"
mode = "block"
