clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 0

when:
  - event: pull_request

steps:
  - name: qlty
    image: alpine:latest
    commands:
      - apk add --no-cache curl xz
      - curl -fsSL https://qlty.sh | QLTY_VERSION=0.618.0 sh
      - export PATH="$HOME/.qlty/bin:$PATH"
      - qlty check --all --no-progress

  - name: test
    image: golang:1.26
    commands:
      - go test -v -count=1 ./...
